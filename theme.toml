name = "selene"
license = "MIT"
licenselink = "https://github.com/zhuzaiye/selene/blob/master/LICENSE"
description = "A clean, elegant Hugo theme with light/dark toggle, WeChat-style posts, and rich shortcodes"
homepage = "https://github.com/zhuzaiye/selene"
tags = ["blog", "minimal", "dark", "light", "responsive", "wechat", "search"]
features = [
  "light/dark theme toggle",
  "WeChat-style post layout",
  "table of contents",
  "MathJax support",
  "Mermaid diagrams",
  "search (elasticlunr)",
  "Gitalk comments",
  "40+ social icons",
  "custom fonts (JetBrains Mono, Space Grotesk, Zed)",
  "responsive design",
  "Umami / GoatCounter analytics",
  "note shortcode",
  "pagination",
  "RSS/Atom feed",
  "syntax highlighting (Dracula)",
]
min_version = "0.110.0"

[author]
  name = "hzzhu92"
  homepage = "https://github.com/zhuzaiye"

